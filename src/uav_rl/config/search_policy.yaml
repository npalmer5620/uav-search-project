env:
  width: 40.0
  height: 40.0
  origin_x: 0.0
  origin_y: 0.0
  coverage_grid_side: 16
  max_step_xy_m: 4.0
  max_yaw_step_rad: 0.78539816339
  decision_period_s: 0.5
  search_speed: 2.0
  target_detection_radius_m: 4.0
  coverage_reward_scale: 10.0
  first_target_found_bonus: 10.0
  success_bonus: 50.0
  step_penalty: 0.001
  boundary_penalty: 0.05
  timeout_penalty: 10.0
  stagnation_penalty: 0.002
  required_target_count:
  max_episode_steps:
  world_path:

ppo:
  policy: MlpPolicy
  seed: 7
  learning_rate: 0.0003
  n_steps: 512
  batch_size: 128
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  ent_coef: 0.01
  vf_coef: 0.5
  clip_range: 0.2

train:
  total_timesteps: 50000
  num_envs: 4
  eval_episodes: 10
  progress_eval_episodes: 5
  progress_eval_interval_timesteps: 2500
  log_interval: 1
  verbose: 1
  curriculum:
    - name: bootstrap_small_map
      total_timesteps: 4
      env:
        width: 20.0
        height: 20.0
        required_target_count: 1
        max_episode_steps: 256
    - name: intermediate_two_targets
      total_timesteps: 6
      env:
        width: 26.0
        height: 26.0
        required_target_count: 2
        max_episode_steps: 320
    - name: intermediate_three_targets
      total_timesteps: 8
      env:
        width: 32.0
        height: 32.0
        required_target_count: 3
        max_episode_steps: 448
    - name: intermediate_four_targets
      total_timesteps: 12
      env:
        width: 36.0
        height: 36.0
        required_target_count: 4
        max_episode_steps: 640
    - name: full_task
      total_timesteps: 20
      env:
        width: 40.0
        height: 40.0
        required_target_count: 5
        max_episode_steps: 768
  artifact_dir: artifacts/rl/search_policy
  tensorboard_log: artifacts/rl/tensorboard
