# ros_gz_bridge topic mappings for x500_mono_cam

- ros_topic_name: /camera/image_raw
  gz_topic_name: /world/default/model/x500_mono_cam_0/link/camera_link/sensor/camera/image
  ros_type_name: sensor_msgs/msg/Image
  gz_type_name: gz.msgs.Image
  direction: GZ_TO_ROS

- ros_topic_name: /camera/camera_info
  gz_topic_name: /world/default/model/x500_mono_cam_0/link/camera_link/sensor/camera/camera_info
  ros_type_name: sensor_msgs/msg/CameraInfo
  gz_type_name: gz.msgs.CameraInfo
  direction: GZ_TO_ROS
