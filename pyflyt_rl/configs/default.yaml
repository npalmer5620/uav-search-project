env:
  backend: pyflyt
  width_m: 40.0
  height_m: 40.0
  cell_size_m: 2.0
  search_altitude_m: 6.0
  max_speed_m_s: 3.0
  decision_period_s: 1.5
  max_episode_steps: 220
  randomize_start: true
  victim_count: 6
  required_victim_count: 4
  obstacle_count: 10
  min_victim_spacing_m: 4.0
  seed: 7
  pyflyt:
    physics_hz: 240
    control_hz: 30
    drone_model: primitive_drone
    camera_fps: 15

camera:
  image_width_px: 320
  image_height_px: 240
  horizontal_fov_deg: 90.0
  camera_pitch_deg: 55.0
  min_range_m: 0.5
  max_range_m: 22.0
  target_height_m: 0.25

perception:
  mode: bbox
  detection_probability: 0.88
  investigate_detection_probability: 0.98
  false_positive_rate: 0.01
  detection_noise_m: 0.45
  match_distance_m: 2.5
  min_hits: 2
  track_timeout_steps: 18
  min_mean_confidence: 0.55
  bbox:
    body_length_m: 1.25
    body_width_m: 0.42
    body_height_m: 0.25
    center_jitter_px: 6.0
    size_jitter_fraction: 0.12
    temporal_jitter_alpha: 0.65
    dropout_rate: 0.08
    duplicate_rate: 0.0
    localization_noise_m: 0.35
    confidence_mean: 0.78
    confidence_std: 0.12
    min_box_area_px2: 12.0

actions:
  scan_yaw_step_deg: 35.0
  investigate_standoff_m: 7.0

rewards:
  new_observed_cell_reward: 0.10
  uncertainty_reduction_reward: 0.04
  detection_update_reward: 1.0
  confirmed_victim_reward: 45.0
  mission_success_bonus: 90.0
  decision_penalty: 0.08
  revisit_penalty: 0.30
  collision_penalty: 15.0
  out_of_bounds_penalty: 10.0
  missed_required_victim_penalty: 10.0

dqn:
  policy: MlpPolicy
  seed: 7
  learning_rate: 0.0001
  buffer_size: 50000
  learning_starts: 1000
  batch_size: 64
  gamma: 0.99
  train_freq: 4
  gradient_steps: 1
  target_update_interval: 1000
  exploration_fraction: 0.30
  exploration_initial_eps: 1.0
  exploration_final_eps: 0.05

train:
  total_timesteps: 50000
  eval_episodes: 10
  baseline_episodes: 20
  artifact_dir: artifacts/latest
  log_interval: 10

sim:
  yolo_model_path: ../yolo11n.pt
  yolo_confidence: 0.30
  yolo_interval_steps: 3
  output_dir: artifacts/sim
